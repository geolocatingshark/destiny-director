# Pre-commit hooks: lint + format + type-check + DB-free unit tests. The unit
# subset (`-m "not integration"`) needs no database; the integration tests run a
# temp-file SQLite engine and are left for `make test`. Run `uv run pre-commit
# install` once to enable. Keep `rev` in sync with the pinned ruff version in
# pyproject.toml.
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.18
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format
  - repo: local
    hooks:
      - id: ty
        name: ty check
        entry: uv run ty check
        language: system
        types: [python]
        pass_filenames: false
      - id: pytest-unit
        name: pytest (unit, DB-free)
        entry: uv run python -m pytest -m "not integration"
        language: system
        types: [python]
        pass_filenames: false
