<!doctype html>
<!--
  Anchor autopost settings — one checkbox per global autopost produce toggle. Served by
  dd.anchor.extensions.autopost_settings; the GET handler substitutes the __TOGGLES__
  placeholder comment in <main> with the server-rendered rows (each reflecting the current
  AutoPostSettings row, sub-toggles indented). Save POSTs the checkbox state as JSON to
  /autopost_settings/save via shared.js's window.api(). Auth is the shared OAuth middleware
  (web_auth), same as every other page.
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Autopost Settings — Destiny Director</title>
    <link rel="stylesheet" href="/static/shared.css" />
    <style>
      /* Base/reset/theme lives in shared.css (linked above); only this page's own
         styles are inlined here. Palette mirrors control_panel.html. */
      main.settings { margin: 1rem 0; }
      form#toggles { display: flex; flex-direction: column; gap: .4rem; }
      label.row {
        display: flex; align-items: center; gap: .6rem;
        border: 1px solid #3a3d44; border-radius: 8px; padding: .6rem .9rem;
        background: #24262c; cursor: pointer;
      }
      label.row:hover { border-color: #2f81f7; }
      label.row.sub { margin-left: 1.6rem; background: #202228; }
      label.row input { width: 1.05rem; height: 1.05rem; accent-color: #2f81f7; }
      label.row .name { font-size: .95rem; }
      .actions {
        display: flex; align-items: center; gap: .8rem; margin-top: 1rem;
      }
      button#save {
        border: 1px solid #2f81f7; border-radius: 8px; padding: .5rem 1.1rem;
        background: #2f81f7; color: #fff; font-size: .95rem; cursor: pointer;
      }
      button#save:disabled { opacity: .6; cursor: default; }
      #status { color: #9aa0a6; font-size: .85rem; }
    </style>
  </head>
  <body>
    <header>
      <h1>Autopost Settings</h1>
      <p class="muted">
        Toggle whether anchor produces each feed. These are global, bot-wide switches —
        they don't change which servers follow a feed. Changes take effect on the next
        scheduled post.
      </p>
    </header>
    <main class="settings">
      <form id="toggles">
        <!--__TOGGLES__-->
      </form>
      <div class="actions">
        <button type="button" id="save">Save</button>
        <span id="status"></span>
      </div>
    </main>
    <!-- shared.js (deferred) defines window.api before DOMContentLoaded fires below. -->
    <script src="/static/shared.js" defer></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const btn = document.getElementById("save");
        const status = document.getElementById("status");
        btn.addEventListener("click", async () => {
          const settings = {};
          document
            .querySelectorAll("input[type=checkbox][data-slug]")
            .forEach((el) => {
              settings[el.dataset.slug] = el.checked;
            });
          btn.disabled = true;
          status.textContent = "Saving…";
          try {
            const res = await window.api("/autopost_settings/save", { settings });
            if (res.ok) {
              status.textContent = "Saved.";
            } else {
              let msg = "Save failed.";
              try {
                const data = await res.json();
                if (data && data.error) msg = data.error;
              } catch (_) {}
              status.textContent = msg;
            }
          } catch (_) {
            status.textContent = "Network error — try again.";
          } finally {
            btn.disabled = false;
          }
        });
      });
    </script>
  </body>
</html>
