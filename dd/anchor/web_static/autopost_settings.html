<!doctype html>
<!--
  Anchor autopost settings — one labelled/described row with a toggle switch per global
  autopost produce toggle. Served by dd.anchor.extensions.autopost_settings; the GET
  handler substitutes the __TOGGLES__ placeholder comment in <main> with the
  server-rendered rows (each reflecting the current AutoPostSettings row). A feed and its
  content sub-toggles share one .group box so they read as one category. Each switch is a
  CSS-styled checkbox, so Save still POSTs the checkbox state
  as JSON to /autopost_settings/save via shared.js's window.api(). Auth is the shared
  OAuth middleware (web_auth), same as every other page.
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Autopost Settings — Destiny Director</title>
    <link rel="stylesheet" href="/static/shared.css" />
    <style>
      /* Base/reset/theme lives in shared.css (linked above); only this page's own
         styles are inlined here. Palette mirrors control_panel.html. */
      main.settings { margin: 1rem 0; }
      form#toggles { display: flex; flex-direction: column; gap: .6rem; }
      /* One box per category: a feed and its content sub-toggles share a .group. */
      .group {
        border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface-3);
        overflow: hidden;
      }
      .group:hover { border-color: var(--border-hover); }
      .row {
        display: flex; align-items: center; justify-content: space-between; gap: 1rem;
        padding: .7rem .9rem;
      }
      /* Sub-options live in the same box, set off by a divider, an indent and a dimmer
         background so they read as "part of this category, not a feed of their own". */
      /* Dim inner divider — deliberately fainter than --border to nest sub-rows. */
      .row + .row { border-top: 1px solid #30333a; }
      .row.sub { padding-left: 1.7rem; background: var(--surface-2); }
      .row.sub .name { font-size: .88rem; }
      .row .text { min-width: 0; }
      .row .name { font-size: .95rem; }
      .row .desc { color: var(--text-faint); font-size: .8rem; margin-top: .15rem; }
      /* A URL setting stacks its full-width text input below the label instead of
         placing a switch on the right. */
      .row.urlrow { flex-direction: column; align-items: stretch; gap: .5rem; }
      .urlfield {
        width: 100%; box-sizing: border-box; padding: .45rem .6rem;
        border: 1px solid var(--border); border-radius: var(--radius);
        background: var(--surface-1); color: var(--text-1); font-size: .9rem;
      }
      .urlfield:focus-visible {
        outline: 2px solid var(--accent); outline-offset: 1px; border-color: var(--accent);
      }

      /* Toggle switch — a checkbox restyled as an iOS-style slider. The <input> stays a
         checkbox (visually hidden) so nothing about the save/read path changes. */
      .switch {
        position: relative; flex: none; width: 42px; height: 24px;
      }
      .switch input { position: absolute; opacity: 0; width: 100%; height: 100%;
        margin: 0; cursor: pointer; }
      .switch .slider {
        position: absolute; inset: 0; border-radius: 24px; background: var(--border);
        transition: background .15s ease;
      }
      .switch .slider::before {
        content: ""; position: absolute; left: 3px; top: 3px; width: 18px; height: 18px;
        border-radius: 50%; background: var(--text-1); transition: transform .15s ease;
      }
      .switch input:checked + .slider { background: var(--accent); }
      /* Pure white knob on the pink fill (>=3:1 non-text contrast; #e6e6e6 would be 2.9). */
      .switch input:checked + .slider::before { transform: translateX(18px); background: #fff; }
      .switch input:focus-visible + .slider {
        outline: 2px solid var(--accent); outline-offset: 2px;
      }
      .actions {
        display: flex; align-items: center; gap: .8rem; margin-top: 1rem;
      }
      button#save {
        border: 1px solid var(--accent-strong); border-radius: var(--radius); padding: .5rem 1.1rem;
        background: var(--accent-strong); color: #fff; font-size: .95rem; cursor: pointer;
      }
      button#save:disabled { opacity: .6; cursor: default; }
      #status { color: var(--text-faint); font-size: .85rem; }
    </style>
  </head>
  <body>
    <header>
      <p class="nav"><a href="/" class="backlink">← Control panel</a></p>
      <h1>Autopost Settings</h1>
      <p class="muted">
        Toggle whether anchor produces each feed. These are global, bot-wide switches —
        they don't change which servers follow a feed. Changes take effect on the next
        scheduled post.
      </p>
    </header>
    <main class="settings">
      <form id="toggles">
        <!--__TOGGLES__-->
      </form>
      <div class="actions">
        <button type="button" id="save">Save</button>
        <span id="status"></span>
      </div>
    </main>
    <!-- shared.js (deferred) defines window.api before DOMContentLoaded fires below. -->
    <script src="/static/shared.js" defer></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const btn = document.getElementById("save");
        const status = document.getElementById("status");
        btn.addEventListener("click", async () => {
          const settings = {};
          document
            .querySelectorAll("input[type=checkbox][data-slug]")
            .forEach((el) => {
              settings[el.dataset.slug] = el.checked;
            });
          document
            .querySelectorAll("input.urlfield[data-slug]")
            .forEach((el) => {
              settings[el.dataset.slug] = el.value;
            });
          btn.disabled = true;
          status.textContent = "Saving…";
          try {
            const res = await window.api("/autopost_settings/save", { settings });
            if (res.ok) {
              status.textContent = "Saved.";
            } else {
              let msg = "Save failed.";
              try {
                const data = await res.json();
                if (data && data.error) msg = data.error;
              } catch (_) {}
              status.textContent = msg;
            }
          } catch (_) {
            status.textContent = "Network error — try again.";
          } finally {
            btn.disabled = false;
          }
        });
      });
    </script>
  </body>
</html>
